<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EJAA Pro-Call System</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .app { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .status { display: flex; gap: 15px; margin: 15px 0; font-weight: bold; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; display: inline-block; }
        .dot.on { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        #chat { height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 10px; background: #f9f9f9; }
        #video-container { height: 400px; margin-top: 10px; display: none; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>

<div class="app">
    <h3>EJAA Control Panel</h3>
    <div class="status">
        <div><span id="dot-Aku" class="dot"></span> Aku</div>
        <div><span id="dot-Billu" class="dot"></span> Billu</div>
    </div>
    
    <input type="password" id="pin" placeholder="Enter PIN (2006/2008)" style="width:100%; padding:10px; box-sizing:border-box;">
    <button onclick="login()" style="width:100%; margin-top:10px; padding:10px; background:#2c3e50; color:white; border:none; border-radius:5px; cursor:pointer;">Login</button>

    <div id="mainUI" style="display:none;">
        <div id="chat"></div>
        <button id="callBtn" onclick="initiateCall()" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:5px;">📞 Start Video Call</button>
        <div id="video-container"></div>
    </div>
</div>

<div id="overlay">
    <p><span id="callerName"></span> is calling!</p>
    <button onclick="answerCall()" style="padding:15px; background:green; color:white; border:none;">Accept Call</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { /* USE YOUR EXISTING CONFIG */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, otherUser, api;

    function login() {
        const pin = document.getElementById('pin').value;
        if (pin === "2006") { currentUser = "Aku"; otherUser = "Billu"; }
        else if (pin === "2008") { currentUser = "Billu"; otherUser = "Aku"; }
        else return alert("Invalid PIN");

        document.getElementById('mainUI').style.display = 'block';
        db.ref("akchat/online/" + currentUser).set(true);
        db.ref("akchat/online/" + currentUser).onDisconnect().remove();

        listenForMessages();
        listenForCalls();
    }

    function initiateCall() {
        db.ref("akchat/messages").push({ sender: currentUser, text: "📞 Calling...", isCall: true, ts: Date.now() });
        db.ref("akchat/calls/signal").set({ from: currentUser, status: "ringing" });
    }

    function listenForCalls() {
        db.ref("akchat/calls/signal").on("value", snap => {
            const call = snap.val();
            if (call && call.status === "ringing" && call.from !== currentUser) {
                document.getElementById('callerName').innerText = call.from;
                document.getElementById('overlay').style.display = "flex";
            }
        });
    }

    function answerCall() {
        document.getElementById('overlay').style.display = "none";
        document.getElementById('video-container').style.display = "block";
        db.ref("akchat/messages").push({ sender: currentUser, text: "Call Accepted ✅", isCall: true, ts: Date.now() });
        
        const domain = "meet.jit.si";
        const options = {
            roomName: "EJAA_Private_Call_Room_123", // Unique ID for the call
            parentNode: document.getElementById('video-container')
        };
        api = new JitsiMeetExternalAPI(domain, options);
    }

    function listenForMessages() {
        db.ref("akchat/messages").on("child_added", snap => {
            const d = snap.val();
            const div = document.createElement("div");
            div.className = "msg" + (d.isCall ? " call-msg" : "");
            div.innerText = d.sender + ": " + d.text;
            document.getElementById('chat').appendChild(div);
            document.getElementById('chat').scrollTop = 9999;
        });
    }

    ["Aku", "Billu"].forEach(n => {
        db.ref("akchat/online/" + n).on("value", s => {
            document.getElementById("dot-" + n).className = "dot" + (s.val() ? " on" : "");
        });
    });
</script>
</body>
</html>
