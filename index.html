<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJAA Secure Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f172a; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #chat-box { width: 400px; height: 600px; background: #f8fafc; border-radius: 30px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        
        /* Animated Gradient Background */
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; background: linear-gradient(45deg, #4facfe, #00f2fe, #b9fbc0); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .bubble { padding: 10px 20px; border-radius: 20px; margin-bottom: 10px; font-family: 'Bangers', cursive; font-size: 1.3rem; max-width: 75%; }
        .out { align-self: flex-end; background: #1e293b; color: white; }
        .in { align-self: flex-start; background: white; color: #1e293b; }
        
        .footer { padding: 15px; background: white; display: flex; gap: 10px; }
        input { flex: 1; border: none; padding: 10px; border-radius: 20px; background: #f1f5f9; outline: none; }
        button { border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; background: #4facfe; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-box">
    <div style="padding: 20px; background: #1e293b; color: white; display: flex; justify-content: space-between;">
        <span>EJAA Chat</span>
        <button onclick="window.open('https://meet.jit.si/EJAA_Secure_Call_998877', '_blank')" style="background: #ff4757;">📹 Video Call</button>
    </div>
    <div class="chat-body" id="messages"></div>
    <div class="footer">
        <input type="text" id="msgInput" placeholder="Message...">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
    // 1. Firebase Logic
    const firebaseConfig = {
        apiKey: "AIzaSyDycrAmK2ObcbcT-L8ord5PDXgKVxonqcw",
        databaseURL: "https://akchat-fa72d-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function send() {
        const text = document.getElementById('msgInput').value;
        db.ref('messages').push({ text: text, sender: 'User' });
        document.getElementById('msgInput').value = '';
    }

    db.ref('messages').on('child_added', (snap) => {
        const msg = snap.val();
        const div = document.createElement('div');
        div.className = 'bubble in';
        div.textContent = msg.text;
        document.getElementById('messages').appendChild(div);
    });
</script>
</body>
</html>
