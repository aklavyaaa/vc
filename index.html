<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #video-container { flex-grow: 1; display: grid; grid-template-rows: 1fr 1fr; gap: 5px; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #333; }
        .controls { padding: 20px; text-align: center; background: #2c3e50; }
        button { padding: 15px 30px; font-size: 16px; border-radius: 50px; border: none; cursor: pointer; }
        .call-btn { background: #27ae60; color: white; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>
</div>

<div class="controls" id="controls">
    <input id="userId" placeholder="Enter your name (aku/billu)">
    <button onclick="init()">Login</button>
    <button id="call-btn" class="call-btn" style="display:none;" onclick="startCall()">Video Call</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    let peer, localStream;
    const targetPeer = (user) => user === 'aku' ? 'billu' : 'aku';

    async function init() {
        const username = document.getElementById('userId').value;
        peer = new Peer(username);
        
        // Get Video + Audio
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;

        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (stream) => { document.getElementById('remoteVideo').srcObject = stream; });
        });
        
        document.getElementById('call-btn').style.display = 'inline-block';
    }

    function startCall() {
        const call = peer.call(targetPeer(document.getElementById('userId').value), localStream);
        call.on('stream', (stream) => { document.getElementById('remoteVideo').srcObject = stream; });
    }
</script>
</body>
</html>
