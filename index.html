<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EJAA Real-Time Call System</title>
<script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
<style>
  body { font-family: -apple-system, sans-serif; background: #f6f6f7; display: flex; justify-content: center; padding: 20px; }
  .app-container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
  #chatBox { height: 250px; overflow-y: auto; border: 1px solid #eee; margin: 15px 0; padding: 10px; background: #fafafa; border-radius: 8px; }
  .msg { margin-bottom: 8px; padding: 8px; border-radius: 8px; background: #eee; font-size: 14px; }
  .call-msg { background: #800020; color: white; text-align: center; font-weight: 600; }
  #callFrame { display: none; width: 100%; height: 400px; border-radius: 12px; margin-top: 10px; }
  #overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); color: white; z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="app-container">
  <h3>EJAA Dashboard</h3>
  <div id="loginSection">
    <input type="password" id="pin" placeholder="Enter PIN (2006/2008)" style="width:100%; padding:10px; box-sizing:border-box;">
    <button onclick="login()" style="width:100%; margin-top:10px; padding:10px; background:#800020; color:white; border:none; cursor:pointer;">Login</button>
  </div>

  <div id="mainSection" style="display:none;">
    <p>Logged in as: <b id="userName"></b></p>
    <div id="chatBox"></div>
    <button id="callBtn" onclick="sendCallSignal()" style="width:100%; padding:12px; background:green; color:white; border:none; cursor:pointer;">📞 Start Video Call</button>
    <div id="callFrame"></div>
  </div>
</div>

<div id="overlay">
  <p><span id="callerDisplay"></span> is calling...</p>
  <button onclick="answerCall()" style="padding:15px; background:green; color:white; border:none;">Accept Call</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = { /* USE YOUR EXISTING CONFIG */ };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  
  let currentUser, callFrame;
  const ROOM_URL = "https://akalvyaaa.daily.co/JDICZkyji5QqluwGkLE4";

  function login() {
    const pin = document.getElementById('pin').value;
    currentUser = (pin === "2006") ? "Aku" : (pin === "2008") ? "Billu" : null;
    if (!currentUser) return alert("Invalid PIN");

    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('mainSection').style.display = 'block';
    document.getElementById('userName').innerText = currentUser;

    listenForMessages();
    listenForCallSignals();
  }

  // 1. Send signal to Firebase (others see this in chat)
  function sendCallSignal() {
    db.ref("akchat/messages").push({ text: "📞 Calling...", sender: currentUser, isCall: true, ts: Date.now() });
    db.ref("akchat/calls/signal").set({ from: currentUser, status: "ringing" });
  }

  // 2. Listen for calls
  function listenForCallSignals() {
    db.ref("akchat/calls/signal").on("value", snap => {
      const call = snap.val();
      if (call && call.status === "ringing" && call.from !== currentUser) {
        document.getElementById('callerDisplay').innerText = call.from;
        document.getElementById('overlay').style.display = "flex";
      }
    });
  }

  // 3. Answer Call
  function answerCall() {
    document.getElementById('overlay').style.display = "none";
    db.ref("akchat/messages").push({ text: "Call Accepted ✅", sender: currentUser, isCall: true, ts: Date.now() });
    joinDailyRoom();
  }

  function joinDailyRoom() {
    document.getElementById('callFrame').style.display = 'block';
    callFrame = window.DailyIframe.createFrame(document.getElementById('callFrame'), {
        showLeaveButton: true,
        iframeStyle: { width: '100%', height: '100%' }
    });
    callFrame.join({ url: ROOM_URL });
  }

  function listenForMessages() {
    db.ref("akchat/messages").on("child_added", snap => {
      const d = snap.val();
      const div = document.createElement("div");
      div.className = "msg" + (d.isCall ? " call-msg" : "");
      div.innerText = d.sender + ": " + d.text;
      document.getElementById('chatBox').appendChild(div);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    });
  }
</script>
</body>
</html>
