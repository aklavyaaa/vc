<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #video-grid { flex-grow: 1; display: grid; grid-template-rows: 1fr 1fr; }
        video { width: 100%; height: 100%; object-fit: cover; border: 1px solid #333; }
        .ui { padding: 20px; text-align: center; background: #1a1a1a; }
        button { padding: 15px 25px; margin: 10px; border-radius: 10px; border: none; font-size: 18px; cursor: pointer; }
        .aku-btn { background: #3498db; color: white; }
        .billu-btn { background: #e67e22; color: white; }
    </style>
</head>
<body>

<div id="video-grid">
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>
</div>

<div class="ui" id="ui">
    <button class="aku-btn" onclick="startApp('aku')">I am AKU</button>
    <button class="billu-btn" onclick="startApp('billu')">I am BILLU</button>
    <p id="status">Select your identity to start</p>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    let peer, localStream;

    async function startApp(username) {
        document.getElementById('status').innerText = "Connecting...";
        
        // 1. Get Camera/Mic
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;

        // 2. Initialize Peer
        peer = new Peer(username);

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Logged in as " + id.toUpperCase();
            
            // If Aku, auto-call Billu
            if (id === 'aku') {
                document.getElementById('status').innerText = "Calling Billu...";
                const call = peer.call('billu', localStream);
                call.on('stream', stream => document.getElementById('remoteVideo').srcObject = stream);
            }
        });

        // 3. If Billu, listen for Aku
        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', stream => document.getElementById('remoteVideo').srcObject = stream);
            document.getElementById('status').innerText = "In Call with Aku";
        });
    }
</script>
</body>
</html>
