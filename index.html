<!DOCTYPE html>
<html>
<head>
  <title>EJAA P2P Call</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: white; }
    video { width: 300px; background: black; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="setup">
    <input id="pin" type="password" placeholder="PIN (2006/2008)">
    <button onclick="init()">Login</button>
  </div>

  <div id="app" style="display:none;">
    <video id="localVideo" autoplay playsinline muted></video>
    <video id="remoteVideo" autoplay playsinline></video>
    <button onclick="startCall()">Start Call</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = { /* YOUR CONFIG */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let localStream, pc;
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    async function init() {
      // 1. Get Camera
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localVideo').srcObject = localStream;
      
      // 2. Setup WebRTC
      pc = new RTCPeerConnection(config);
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
      
      // 3. Handle ICE Candidates (Signaling)
      pc.onicecandidate = e => { if(e.candidate) db.ref('calls/candidates').push(e.candidate); };
      
      document.getElementById('app').style.display = 'block';
    }

    async function startCall() {
      // Create Offer and save to Firebase
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      db.ref('calls/offer').set(offer);
    }

    // Listen for incoming offer
    db.ref('calls/offer').on('value', async snap => {
      if (!pc.remoteDescription && snap.val()) {
        await pc.setRemoteDescription(snap.val());
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        db.ref('calls/answer').set(answer);
      }
    });

    // Listen for Answer
    db.ref('calls/answer').on('value', async snap => {
      if (snap.val()) await pc.setRemoteDescription(snap.val());
    });
  </script>
</body>
</html>
