<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Call App</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="user-display">Login to continue</h2>
    <div id="login-section">
        <button onclick="login('aku')">Login as Aku</button>
        <button onclick="login('billu')">Login as Billu</button>
    </div>
    <div id="call-section" style="display:none;">
        <p id="status">Ready</p>
        <button id="call-btn" onclick="startCall()" style="display:none;">Call Billu</button>
        <audio id="remoteAudio" autoplay></audio>
    </div>
</div>

<script>
    let peer;
    let currentUser;
    const peerConfig = { host: '0.peerjs.com', port: 443, secure: true };

    function login(username) {
        currentUser = username;
        document.getElementById('user-display').innerText = `Logged in as: ${username.toUpperCase()}`;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('call-section').style.display = 'block';

        peer = new Peer(username, peerConfig);

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Connected! Waiting for call...";
            if (username === 'aku') document.getElementById('call-btn').style.display = 'inline-block';
        });

        // Listen for incoming calls
        peer.on('call', (call) => {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                call.answer(stream);
                call.on('stream', remoteStream => {
                    const audio = document.getElementById('remoteAudio');
                    audio.srcObject = remoteStream;
                    document.getElementById('status').innerText = "Call Connected!";
                });
            });
        });
    }

    async function startCall() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const call = peer.call('billu', stream);
        call.on('stream', remoteStream => {
            const audio = document.getElementById('remoteAudio');
            audio.srcObject = remoteStream;
            document.getElementById('status').innerText = "Calling Billu...";
        });
    }
</script>
</body>
</html>
